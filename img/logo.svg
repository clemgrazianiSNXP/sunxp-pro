<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100">
  <defs>
    <linearGradient id="swoosh1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0c050;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="swoosh2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9090a0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c6af7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b8aff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- "sun" text -->
  <text x="10" y="72" font-family="Segoe UI, system-ui, sans-serif" font-size="38" font-weight="400" fill="#8899bb" letter-spacing="1">sun</text>
  <!-- X swoosh - gold curve -->
  <path d="M95,15 Q130,50 105,85 Q115,65 125,50 Q135,35 145,15" fill="none" stroke="url(#swoosh1)" stroke-width="8" stroke-linecap="round"/>
  <!-- X swoosh - silver curve -->
  <path d="M145,15 Q115,50 140,85 Q130,65 120,50 Q110,35 100,15" fill="none" stroke="url(#swoosh2)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <!-- Outer swoosh arc -->
  <path d="M90,10 Q155,5 155,50 Q155,95 90,90" fill="none" stroke="url(#swoosh2)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- "P" large gold -->
  <text x="148" y="78" font-family="Segoe UI, system-ui, sans-serif" font-size="52" font-weight="700" fill="url(#swoosh1)">P</text>
  <!-- "ro" text -->
  <text x="185" y="78" font-family="Segoe UI, system-ui, sans-serif" font-size="32" font-weight="400" fill="#8899bb">ro</text>
</svg>
